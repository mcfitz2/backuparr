services:
  # MinIO S3-compatible storage
  minio:
    image: minio/minio:latest
    container_name: backuparr-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MinIO client to create bucket
  minio-setup:
    image: minio/mc:latest
    container_name: backuparr-minio-setup
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/backups --ignore-existing;
      mc anonymous set download myminio/backups;
      echo 'MinIO bucket created successfully';
      "

  # Sonarr
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: backuparr-sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    ports:
      - "8989:8989"
    volumes:
      - sonarr_config:/config
    restart: unless-stopped

  # Radarr
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: backuparr-radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    ports:
      - "7878:7878"
    volumes:
      - radarr_config:/config
    restart: unless-stopped

  # Lidarr
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: backuparr-lidarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    ports:
      - "8686:8686"
    volumes:
      - lidarr_config:/config
    restart: unless-stopped

  # Backuparr
  backuparr:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backuparr
    depends_on:
      - minio
      - sonarr
      - radarr
      - lidarr
    ports:
      - "8080:8080"
    environment:
      # S3 credentials
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      # *arr API keys (get these from each service after first run)
      - SONARR_API_KEY=${SONARR_API_KEY}
      - RADARR_API_KEY=${RADARR_API_KEY}
      - LIDARR_API_KEY=${LIDARR_API_KEY}
    volumes:
      - ./config.yaml:/app/config/config.yaml:ro
      - ./minio-creds.yaml:/app/config/minio-creds.yaml:ro
      - backuparr_tmp:/app/tmp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  minio_data:
  sonarr_config:
  radarr_config:
  lidarr_config:
  backuparr_tmp:

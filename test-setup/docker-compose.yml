services:
  # Sonarr instance for integration testing
  sonarr:
    image: linuxserver/sonarr:latest
    container_name: backuparr-test-sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    ports:
      - "8989:8989"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Radarr instance for integration testing
  radarr:
    image: linuxserver/radarr:latest
    container_name: backuparr-test-radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    ports:
      - "7878:7878"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7878/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Lidarr instance for integration testing
  lidarr:
    image: linuxserver/lidarr:latest
    container_name: backuparr-test-lidarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    ports:
      - "8686:8686"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8686/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Prowlarr instance for integration testing
  prowlarr:
    image: linuxserver/prowlarr:develop
    container_name: backuparr-test-prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    ports:
      - "9696:9696"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9696/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # MinIO for S3 testing
  minio:
    image: minio/minio:latest
    container_name: backuparr-test-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
